apiVersion: apps/v1
kind: Deployment
metadata:
  name: manael
  labels:
    app: manael
spec:
  selector:
    matchLabels:
      app: manael
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: manael
    spec:
      containers:
      - name: manael
        image: ghcr.io/manaelproxy/manael:3.0.2@sha256:7fc52196d1b3ccf113972f945e7146a5f6e429e1f3930efbb003b22dd65d44d1
        env:
        - name: MANAEL_ENABLE_AVIF
          value: "true"
        ports:
        - containerPort: 8080
