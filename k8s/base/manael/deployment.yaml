apiVersion: apps/v1
kind: Deployment
metadata:
  name: manael
  labels:
    app: manael
spec:
  selector:
    matchLabels:
      app: manael
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: manael
    spec:
      containers:
      - name: manael
        image: ghcr.io/manaelproxy/manael:2.1.0@sha256:04480e9d046ec40e021908a9d4bfa6354717b8dceb0868fef718b85726e4a7bf
        ports:
        - containerPort: 8080
